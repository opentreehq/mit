version: "3"

vars:
  BINARY: mit
  BUILD_DIR: ./cmd/mit
  LLAMA_DIR: third_party/llama.cpp
  LLAMA_BUILD: "{{.LLAMA_DIR}}/build"

tasks:
  default:
    desc: Build with embedding support (requires llama.cpp)
    deps: [build-llama]
    env:
      CGO_ENABLED: "1"
    cmds:
      - go build -o {{.BINARY}} {{.BUILD_DIR}}

  build:
    desc: Build with embedding support (requires llama.cpp)
    deps: [build-llama]
    env:
      CGO_ENABLED: "1"
    cmds:
      - go build -o {{.BINARY}} {{.BUILD_DIR}}

  install:
    desc: Install mit binary
    deps: [build-llama]
    env:
      CGO_ENABLED: "1"
    cmds:
      - go install {{.BUILD_DIR}}

  test:
    desc: Run all tests
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test ./... -count=1 -tags noembed

  test-verbose:
    desc: Run all tests with verbose output
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test ./... -v -count=1 -tags noembed

  test-coverage:
    desc: Run tests with coverage report
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test ./... -coverprofile=coverage.out -tags noembed
      - go tool cover -html=coverage.out -o coverage.html

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} coverage.out coverage.html

  lint:
    desc: Run go vet
    env:
      CGO_ENABLED: "1"
    cmds:
      - go vet -tags noembed ./...

  build-llama:
    desc: Build llama.cpp static libraries
    status:
      - test -f {{.LLAMA_BUILD}}/src/libllama.a
    cmds:
      - echo "Building llama.cpp..."
      - >-
        cmake -B {{.LLAMA_BUILD}} -S {{.LLAMA_DIR}}
        -DBUILD_SHARED_LIBS=OFF
        -DLLAMA_BUILD_EXAMPLES=OFF
        -DLLAMA_BUILD_TESTS=OFF
        -DLLAMA_BUILD_SERVER=OFF
      - cmake --build {{.LLAMA_BUILD}} --config Release -j

  build-full:
    desc: Build with embedding support (alias for build)
    deps: [build-llama]
    env:
      CGO_ENABLED: "1"
    cmds:
      - go build -o {{.BINARY}} {{.BUILD_DIR}}

  build-lite:
    desc: Build without embedding support (no CGo needed)
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -tags noembed -o {{.BINARY}} {{.BUILD_DIR}}

  schema:
    desc: Generate JSON schema for mit.yaml
    env:
      CGO_ENABLED: "0"
    cmds:
      - go run -tags noembed ./cmd/schema
