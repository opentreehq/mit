version: "3"

vars:
  BINARY: mit
  BUILD_DIR: ./cmd/mit
  RELEASE_DIR: dist/release
  VERSION:
    sh: git describe --tags --always --dirty
  GITHUB_REPO: github.com/gabemeola/mit
  LLAMA_DIR: third_party/llama.cpp
  LLAMA_BUILD: "{{.LLAMA_DIR}}/build"
  NPROC:
    sh: sysctl -n hw.ncpu 2>/dev/null || nproc 2>/dev/null || echo 4
  HOST_TARGET:
    sh: |
      os=$(uname -s | tr '[:upper:]' '[:lower:]' | sed 's/darwin/macos/' | sed 's/mingw.*/windows/')
      arch=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/' | sed 's/arm64/arm64/')
      echo "${os}-${arch}"

tasks:
  build:
    desc: Build for the current platform
    deps: [schema]
    cmds:
      - task: "build:{{.HOST_TARGET}}"

  install:
    desc: Install mit binary
    deps: ["build-llama:{{.HOST_TARGET}}"]
    env:
      CGO_ENABLED: "1"
    cmds:
      - go install {{.BUILD_DIR}}

  # ── Platform targets ────────────────────────────────────────────────

  build:macos-arm64:
    desc: Build for macOS (Metal + Accelerate)
    deps: [build-llama:macos-arm64]
    env:
      CGO_ENABLED: "1"
    cmds:
      - go build -o dist/{{.BINARY}} {{.BUILD_DIR}}

  build:linux-amd64:
    desc: Cross-compile for Linux x86_64 (CPU-only)
    deps: [build-llama:linux-amd64]
    env:
      CGO_ENABLED: "1"
      GOOS: linux
      GOARCH: amd64
      CC: "zig cc -target x86_64-linux-gnu"
      CXX: "zig c++ -target x86_64-linux-gnu"
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-linux-amd64/src -L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-linux-amd64/ggml/src -L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-linux-amd64/ggml/src/ggml-cpu"
    cmds:
      - go build -o dist/mit-linux-amd64 {{.BUILD_DIR}}

  build:linux-arm64:
    desc: Cross-compile for Linux aarch64 (CPU-only)
    deps: [build-llama:linux-arm64]
    env:
      CGO_ENABLED: "1"
      GOOS: linux
      GOARCH: arm64
      CC: "zig cc -target aarch64-linux-gnu"
      CXX: "zig c++ -target aarch64-linux-gnu"
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-linux-arm64/src -L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-linux-arm64/ggml/src -L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-linux-arm64/ggml/src/ggml-cpu"
    cmds:
      - go build -o dist/mit-linux-arm64 {{.BUILD_DIR}}

  build:windows-amd64:
    desc: Cross-compile for Windows x86_64 (CPU-only)
    deps: [build-llama:windows-amd64]
    env:
      CGO_ENABLED: "1"
      GOOS: windows
      GOARCH: amd64
      CC: "zig cc -target x86_64-windows-gnu"
      CXX: "zig c++ -target x86_64-windows-gnu"
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-windows-amd64/src -L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-windows-amd64/ggml/src -L{{.ROOT_DIR}}/{{.LLAMA_BUILD}}-windows-amd64/ggml/src/ggml-cpu"
    cmds:
      - go build -o dist/mit-windows-amd64.exe {{.BUILD_DIR}}

  # ── llama.cpp builds ────────────────────────────────────────────────

  build-llama:macos-arm64:
    desc: Build llama.cpp for macOS (Metal + Accelerate)
    status:
      - test -f {{.LLAMA_BUILD}}/src/libllama.a
    cmds:
      - echo "Building llama.cpp (macOS Metal + Accelerate)..."
      - >-
        cmake -B {{.LLAMA_BUILD}} -S {{.LLAMA_DIR}}
        -DBUILD_SHARED_LIBS=OFF
        -DLLAMA_BUILD_EXAMPLES=OFF
        -DLLAMA_BUILD_TESTS=OFF
        -DLLAMA_BUILD_SERVER=OFF
        -DGGML_METAL=ON
        -DGGML_BLAS=ON
        -DGGML_BLAS_VENDOR=Apple
      - cmake --build {{.LLAMA_BUILD}} --config Release -j{{.NPROC}}

  build-llama:linux-amd64:
    desc: Build llama.cpp for Linux x86_64 (CPU-only) using zig
    status:
      - test -f {{.LLAMA_BUILD}}-linux-amd64/src/libllama.a
    cmds:
      - echo "Building llama.cpp (Linux x86_64 CPU-only)..."
      - >-
        cmake -B {{.LLAMA_BUILD}}-linux-amd64 -S {{.LLAMA_DIR}}
        -DCMAKE_TOOLCHAIN_FILE={{.ROOT_DIR}}/cmake/zig-linux-x86_64.cmake
        -DBUILD_SHARED_LIBS=OFF
        -DLLAMA_BUILD_EXAMPLES=OFF
        -DLLAMA_BUILD_TESTS=OFF
        -DLLAMA_BUILD_SERVER=OFF
        -DGGML_METAL=OFF
        -DGGML_BLAS=OFF
      - cmake --build {{.LLAMA_BUILD}}-linux-amd64 --config Release --target llama --target ggml -j{{.NPROC}}

  build-llama:linux-arm64:
    desc: Build llama.cpp for Linux aarch64 (CPU-only) using zig
    status:
      - test -f {{.LLAMA_BUILD}}-linux-arm64/src/libllama.a
    cmds:
      - echo "Building llama.cpp (Linux aarch64 CPU-only)..."
      - >-
        cmake -B {{.LLAMA_BUILD}}-linux-arm64 -S {{.LLAMA_DIR}}
        -DCMAKE_TOOLCHAIN_FILE={{.ROOT_DIR}}/cmake/zig-linux-aarch64.cmake
        -DBUILD_SHARED_LIBS=OFF
        -DLLAMA_BUILD_EXAMPLES=OFF
        -DLLAMA_BUILD_TESTS=OFF
        -DLLAMA_BUILD_SERVER=OFF
        -DGGML_METAL=OFF
        -DGGML_BLAS=OFF
      - cmake --build {{.LLAMA_BUILD}}-linux-arm64 --config Release --target llama --target ggml -j{{.NPROC}}

  build-llama:windows-amd64:
    desc: Build llama.cpp for Windows x86_64 (CPU-only) using zig
    status:
      - test -f {{.LLAMA_BUILD}}-windows-amd64/src/libllama.a
    cmds:
      - echo "Building llama.cpp (Windows x86_64 CPU-only)..."
      - >-
        cmake -B {{.LLAMA_BUILD}}-windows-amd64 -S {{.LLAMA_DIR}}
        -DCMAKE_TOOLCHAIN_FILE={{.ROOT_DIR}}/cmake/zig-windows-x86_64.cmake
        -DBUILD_SHARED_LIBS=OFF
        -DLLAMA_BUILD_EXAMPLES=OFF
        -DLLAMA_BUILD_TESTS=OFF
        -DLLAMA_BUILD_SERVER=OFF
        -DGGML_METAL=OFF
        -DGGML_BLAS=OFF
      - cmake --build {{.LLAMA_BUILD}}-windows-amd64 --config Release --target llama --target ggml -j{{.NPROC}}
      # cmake drops the lib prefix for ggml targets on Windows; fix so -l flags work
      - for f in {{.LLAMA_BUILD}}-windows-amd64/ggml/src/*.a; do b=$(basename "$f"); case "$b" in lib*) ;; *) mv "$f" "$(dirname "$f")/lib$b" ;; esac; done

  # ── Utilities ───────────────────────────────────────────────────────

  build-lite:
    desc: Build without embedding support (no CGo needed)
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -tags noembed -o dist/{{.BINARY}} {{.BUILD_DIR}}

  release:
    desc: Build and package local release artifacts
    deps: [schema]
    vars:
      RELEASE_TAG: '{{if .TAG}}{{.TAG}}{{else}}{{.VERSION}}{{end}}'
    cmds:
      # Start from a clean release directory so checksums and uploads are deterministic.
      - rm -rf {{.RELEASE_DIR}}
      - mkdir -p {{.RELEASE_DIR}}

      # Build each supported target using the existing platform-specific tasks.
      - task: build:macos-arm64
      - task: build:linux-amd64
      - task: build:linux-arm64
      - task: build:windows-amd64

      # Assemble release archives with stable filenames that match the GitHub asset URLs
      # referenced by the generated Homebrew formula.
      - mkdir -p {{.RELEASE_DIR}}/mit_Darwin_arm64
      - cp dist/{{.BINARY}} {{.RELEASE_DIR}}/mit_Darwin_arm64/{{.BINARY}}
      - cp README.md LICENSE {{.RELEASE_DIR}}/mit_Darwin_arm64/
      - tar -C {{.RELEASE_DIR}} -czf {{.RELEASE_DIR}}/{{.BINARY}}_Darwin_arm64.tar.gz mit_Darwin_arm64
      - rm -rf {{.RELEASE_DIR}}/mit_Darwin_arm64
      - mkdir -p {{.RELEASE_DIR}}/mit_Linux_x86_64
      - cp dist/{{.BINARY}}-linux-amd64 {{.RELEASE_DIR}}/mit_Linux_x86_64/{{.BINARY}}
      - cp README.md LICENSE {{.RELEASE_DIR}}/mit_Linux_x86_64/
      - tar -C {{.RELEASE_DIR}} -czf {{.RELEASE_DIR}}/{{.BINARY}}_Linux_x86_64.tar.gz mit_Linux_x86_64
      - rm -rf {{.RELEASE_DIR}}/mit_Linux_x86_64
      - mkdir -p {{.RELEASE_DIR}}/mit_Linux_arm64
      - cp dist/{{.BINARY}}-linux-arm64 {{.RELEASE_DIR}}/mit_Linux_arm64/{{.BINARY}}
      - cp README.md LICENSE {{.RELEASE_DIR}}/mit_Linux_arm64/
      - tar -C {{.RELEASE_DIR}} -czf {{.RELEASE_DIR}}/{{.BINARY}}_Linux_arm64.tar.gz mit_Linux_arm64
      - rm -rf {{.RELEASE_DIR}}/mit_Linux_arm64
      - mkdir -p {{.RELEASE_DIR}}/mit_Windows_x86_64
      - cp dist/{{.BINARY}}-windows-amd64.exe {{.RELEASE_DIR}}/mit_Windows_x86_64/{{.BINARY}}.exe
      - cp README.md LICENSE {{.RELEASE_DIR}}/mit_Windows_x86_64/
      - zip -j {{.RELEASE_DIR}}/{{.BINARY}}_Windows_x86_64.zip {{.RELEASE_DIR}}/mit_Windows_x86_64/{{.BINARY}}.exe {{.RELEASE_DIR}}/mit_Windows_x86_64/README.md {{.RELEASE_DIR}}/mit_Windows_x86_64/LICENSE
      - rm -rf {{.RELEASE_DIR}}/mit_Windows_x86_64

      # Emit a checksum manifest for release verification and uploads.
      - shasum -a 256 {{.RELEASE_DIR}}/* > {{.RELEASE_DIR}}/checksums.txt

      # Generate a Homebrew formula that points at the GitHub release assets for the
      # tag being prepared. The formula SHA256 values are computed from the local archives.
      - |
        tag='{{.RELEASE_TAG}}'
        version="${tag#v}"
        darwin_arm64_sha=$(shasum -a 256 {{.RELEASE_DIR}}/{{.BINARY}}_Darwin_arm64.tar.gz | awk '{print $1}')
        linux_amd64_sha=$(shasum -a 256 {{.RELEASE_DIR}}/{{.BINARY}}_Linux_x86_64.tar.gz | awk '{print $1}')
        linux_arm64_sha=$(shasum -a 256 {{.RELEASE_DIR}}/{{.BINARY}}_Linux_arm64.tar.gz | awk '{print $1}')
        cat > {{.RELEASE_DIR}}/{{.BINARY}}.rb <<EOF
        # typed: false
        # frozen_string_literal: true

        # This file was generated by task release. DO NOT EDIT.
        class Mit < Formula
          desc "Multi-repo Integration Tool. Manage multiple repositories as a unified workspace without git submodules."
          homepage "https://github.com/gabemeola/mit"
          version "${version}"
          license "MPL-2.0"

          on_macos do
            if Hardware::CPU.arm?
              url "https://{{.GITHUB_REPO}}/releases/download/${tag}/mit_Darwin_arm64.tar.gz"
              sha256 "${darwin_arm64_sha}"

              def install
                bin.install "mit"
              end
            end
          end

          on_linux do
            if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
              url "https://{{.GITHUB_REPO}}/releases/download/${tag}/mit_Linux_x86_64.tar.gz"
              sha256 "${linux_amd64_sha}"

              def install
                bin.install "mit"
              end
            end

            if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
              url "https://{{.GITHUB_REPO}}/releases/download/${tag}/mit_Linux_arm64.tar.gz"
              sha256 "${linux_arm64_sha}"

              def install
                bin.install "mit"
              end
            end
          end
        end
        EOF

  publish:
    desc: Create a GitHub release from local artifacts
    vars:
      RELEASE_TAG: '{{if .TAG}}{{.TAG}}{{else}}{{.VERSION}}{{end}}'
    preconditions:
      - sh: test -d {{.RELEASE_DIR}} && test -n "$(ls -A {{.RELEASE_DIR}})"
        msg: Run `task release` first to create artifacts in {{.RELEASE_DIR}}
    cmds:
      - gh release create {{.RELEASE_TAG}} {{.RELEASE_DIR}}/* --title {{.RELEASE_TAG}} --generate-notes

  test:
    desc: Run all tests
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test ./... -count=1 -tags noembed

  test-verbose:
    desc: Run all tests with verbose output
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test ./... -v -count=1 -tags noembed

  test-coverage:
    desc: Run tests with coverage report
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test ./... -coverprofile=coverage.out -tags noembed
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run go vet
    env:
      CGO_ENABLED: "1"
    cmds:
      - go vet -tags noembed ./...

  clean:
    desc: Remove build artifacts
    deps: [clean-llama]
    cmds:
      - rm -f coverage.out coverage.html
      - rm -rf dist/

  clean-llama:
    desc: Remove all llama.cpp build artifacts (all platforms)
    cmds:
      - rm -rf {{.LLAMA_BUILD}} {{.LLAMA_BUILD}}-linux-amd64 {{.LLAMA_BUILD}}-linux-arm64 {{.LLAMA_BUILD}}-windows-amd64

  schema:
    desc: Generate JSON schema for mit.yaml
    env:
      CGO_ENABLED: "0"
    cmds:
      - go run -tags noembed ./cmd/schema
